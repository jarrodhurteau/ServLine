{% extends "base.html" %}
{% block title %}Login · ServLine{% endblock %}

{% block content %}
  <section class="card max-w-sm mx-auto">
    <h1 class="text-xl font-semibold mb-4">Sign In</h1>

    {% if error %}
      <div class="mb-3 rounded-xl border border-red-500 bg-red-900/40 px-3 py-2 text-red-200">
        {{ error }}
      </div>
    {% endif %}

    <form method="post" action="/login" class="space-y-4">
      <input type="hidden" name="next" value="{{ next or '/' }}">

      <div>
        <label for="username" class="block mb-1 font-medium">Username <span class="text-red-500">*</span></label>
        <input id="username" name="username" required
               class="form-control w-full rounded-xl border border-line px-3 py-2 bg-white text-black">
      </div>

      <div>
        <label for="password" class="block mb-1 font-medium">Password <span class="text-red-500">*</span></label>
        <div style="position:relative">
          <input id="password" name="password" type="password" required
                 class="form-control w-full rounded-xl border border-line px-3 py-2 bg-white text-black" style="padding-right:2.5rem">
          <button type="button" onclick="togglePw('password',this)" style="position:absolute;right:0.5rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:1.1rem;color:#333" title="Show password">&#128065;</button>
        </div>
      </div>

      <button type="submit" class="btn btn-primary w-full">Sign In</button>
    </form>

    <script>
    function togglePw(id,btn){var i=document.getElementById(id);if(i.type==='password'){i.type='text';btn.title='Hide password';}else{i.type='password';btn.title='Show password';}}
    </script>

    <p class="text-center text-sm mt-4 text-muted">
      Don't have an account? Create your free account <a href="/register" class="text-brand underline font-semibold uppercase">HERE</a>
    </p>
  </section>
{% endblock %}
