{% extends "base.html" %}
{% block title %}Register · ServLine{% endblock %}

{% block content %}
  <section class="card max-w-sm mx-auto">
    <h1 class="text-xl font-semibold mb-4">Create Account</h1>

    {% if error %}
      <div class="mb-3 rounded-xl border border-red-500 bg-red-900/40 px-3 py-2 text-red-200">
        {{ error }}
      </div>
    {% endif %}

    <form method="post" action="/register" class="space-y-4">

      <div>
        <label for="email" class="block mb-1 font-medium">Email <span class="text-red-500">*</span></label>
        <input id="email" name="email" type="email" required
               class="form-control w-full rounded-xl border border-line px-3 py-2 bg-white text-black">
      </div>

      <div>
        <label for="display_name" class="block mb-1 font-medium">Display Name</label>
        <input id="display_name" name="display_name"
               class="form-control w-full rounded-xl border border-line px-3 py-2 bg-white text-black"
               placeholder="Optional">
      </div>

      <div>
        <label for="password" class="block mb-1 font-medium">Password <span class="text-red-500">*</span></label>
        <div style="position:relative">
          <input id="password" name="password" type="password" required minlength="8"
                 class="form-control w-full rounded-xl border border-line px-3 py-2 bg-white text-black" style="padding-right:2.5rem">
          <button type="button" onclick="togglePw('password',this)" style="position:absolute;right:0.5rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:1.1rem;color:#333" title="Show password">&#128065;</button>
        </div>
        <p class="text-xs text-muted mt-1">At least 8 characters</p>
      </div>

      <div>
        <label for="confirm_password" class="block mb-1 font-medium">Confirm Password <span class="text-red-500">*</span></label>
        <div style="position:relative">
          <input id="confirm_password" name="confirm_password" type="password" required minlength="8"
                 class="form-control w-full rounded-xl border border-line px-3 py-2 bg-white text-black" style="padding-right:2.5rem">
          <button type="button" onclick="togglePw('confirm_password',this)" style="position:absolute;right:0.5rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:1.1rem;color:#333" title="Show password">&#128065;</button>
        </div>
      </div>

      <button type="submit" class="btn btn-primary w-full">Create Account</button>
    </form>

    <script>
    function togglePw(id,btn){var i=document.getElementById(id);if(i.type==='password'){i.type='text';btn.title='Hide password';}else{i.type='password';btn.title='Show password';}}
    </script>

    <p class="text-center text-sm mt-4 text-muted">
      Already have an account? <a href="/login" class="text-brand hover:underline">Sign in</a>
    </p>
  </section>
{% endblock %}
