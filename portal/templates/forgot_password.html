{% extends "base.html" %}
{% block title %}Forgot Password · ServLine{% endblock %}

{% block content %}
  <section class="card max-w-sm mx-auto">
    <h1 class="text-xl font-semibold mb-4">Forgot Password</h1>

    <p class="text-sm text-muted mb-4">Enter your email address and we'll send you a link to reset your password.</p>

    <form method="post" action="/forgot-password" class="space-y-4">
      <div>
        <label for="email" class="block mb-1 font-medium">Email <span class="text-red-500">*</span></label>
        <input id="email" name="email" type="email" required
               class="form-control w-full rounded-xl border border-line px-3 py-2 bg-white text-black"
               placeholder="you@example.com">
      </div>

      <button type="submit" class="btn btn-primary w-full">Send Reset Link</button>
    </form>

    <p class="text-center text-sm mt-4 text-muted">
      Remember your password? <a href="/login" class="text-brand underline font-semibold">Sign In</a>
    </p>
  </section>
{% endblock %}
