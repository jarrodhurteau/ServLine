{% extends "base.html" %}
{% block title %}Reset Password · ServLine{% endblock %}

{% block content %}
  <section class="card max-w-sm mx-auto">
    <h1 class="text-xl font-semibold mb-4">Reset Password</h1>

    <p class="text-sm text-muted mb-4">Enter your new password below.</p>

    <form method="post" action="/reset-password/{{ token }}" class="space-y-4">
      <div>
        <label for="new_password" class="block mb-1 font-medium">New Password <span class="text-red-500">*</span></label>
        <div style="position:relative">
          <input id="new_password" name="new_password" type="password" required minlength="8"
                 class="form-control w-full rounded-xl border border-line px-3 py-2 bg-white text-black" style="padding-right:2.5rem">
          <button type="button" onclick="togglePw('new_password',this)" style="position:absolute;right:0.5rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:1.1rem;color:#333" title="Show password">&#128065;</button>
        </div>
      </div>

      <div>
        <label for="confirm_password" class="block mb-1 font-medium">Confirm Password <span class="text-red-500">*</span></label>
        <div style="position:relative">
          <input id="confirm_password" name="confirm_password" type="password" required minlength="8"
                 class="form-control w-full rounded-xl border border-line px-3 py-2 bg-white text-black" style="padding-right:2.5rem">
          <button type="button" onclick="togglePw('confirm_password',this)" style="position:absolute;right:0.5rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:1.1rem;color:#333" title="Show password">&#128065;</button>
        </div>
      </div>

      <button type="submit" class="btn btn-primary w-full">Reset Password</button>
    </form>

    <script>
    function togglePw(id,btn){var i=document.getElementById(id);if(i.type==='password'){i.type='text';btn.title='Hide password';}else{i.type='password';btn.title='Show password';}}
    </script>

    <p class="text-center text-sm mt-4 text-muted">
      <a href="/login" class="text-brand underline font-semibold">Back to Sign In</a>
    </p>
  </section>
{% endblock %}
